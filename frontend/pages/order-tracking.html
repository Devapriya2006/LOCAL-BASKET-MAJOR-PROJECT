<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Order – LocalBasket</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .track-hero {
      background: linear-gradient(135deg, var(--soil), var(--earth));
      padding: 2.5rem 0;
      text-align: center;
      color: var(--straw);
    }
    .track-hero h1 { color: var(--straw); margin-bottom: .5rem; font-size: 1.8rem; }
    .track-hero p { color: var(--gray-300, #ccc); font-size: .9rem; }
    .order-track-card {
      background: white;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      max-width: 760px;
      margin: -1.5rem auto 2rem;
      overflow: hidden;
    }
    .track-status-bar {
      background: linear-gradient(90deg, var(--leaf), var(--sage));
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: .75rem;
    }
    .track-status-bar .status-label { color: white; font-size: .82rem; opacity: .85; }
    .track-status-bar .status-val { color: white; font-size: 1.1rem; font-weight: 700; }
    /* Progress Steps */
    .progress-track { padding: 2rem 2rem 1rem; }
    .progress-steps { display: flex; align-items: flex-start; position: relative; }
    .progress-steps::before {
      content: '';
      position: absolute;
      top: 20px; left: 20px; right: 20px;
      height: 3px;
      background: var(--gray-200);
      z-index: 0;
    }
    .progress-fill {
      position: absolute;
      top: 20px; left: 20px;
      height: 3px;
      background: linear-gradient(90deg, var(--leaf), var(--sage));
      z-index: 1;
      transition: width .6s ease;
    }
    .progress-step {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .5rem;
      position: relative;
      z-index: 2;
    }
    .step-circle {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 3px solid var(--gray-200);
      background: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      transition: all .4s ease;
    }
    .progress-step.done .step-circle {
      background: var(--leaf);
      border-color: var(--leaf);
      box-shadow: 0 0 0 4px rgba(45,106,45,.15);
    }
    .progress-step.active .step-circle {
      background: var(--sage);
      border-color: var(--sage);
      box-shadow: 0 0 0 6px rgba(90,138,74,.2);
      animation: pulse 1.5s infinite;
    }
    .progress-step.cancelled .step-circle { background: var(--tomato); border-color: var(--tomato); }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 4px rgba(90,138,74,.2)} 50%{box-shadow:0 0 0 8px rgba(90,138,74,.1)} }
    .step-label { font-size: .72rem; font-weight: 600; color: var(--gray-400); text-align: center; max-width: 70px; line-height: 1.3; }
    .progress-step.done .step-label, .progress-step.active .step-label { color: var(--leaf); }
    .step-time { font-size: .65rem; color: var(--gray-400); text-align: center; max-width: 70px; }
    /* Timeline */
    .timeline { padding: 0 2rem 1.5rem; }
    .tl-item { display: flex; gap: 1rem; padding: .75rem 0; border-left: 2px solid var(--gray-200); margin-left: .8rem; padding-left: 1.25rem; position: relative; }
    .tl-item:last-child { border-left: 2px solid transparent; }
    .tl-dot {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--gray-200);
      border: 2px solid white;
      box-shadow: 0 0 0 2px var(--gray-200);
      position: absolute;
      left: -9px;
      top: 1rem;
      flex-shrink: 0;
    }
    .tl-item.current .tl-dot { background: var(--leaf); box-shadow: 0 0 0 2px var(--leaf); }
    .tl-item.done .tl-dot { background: var(--sage); box-shadow: 0 0 0 2px var(--sage); }
    .tl-content { flex: 1; }
    .tl-title { font-weight: 600; font-size: .9rem; color: var(--soil); }
    .tl-time { font-size: .78rem; color: var(--gray-400); margin-top: .1rem; }
    .tl-note { font-size: .8rem; color: var(--bark); margin-top: .2rem; }
    /* Order details */
    .order-body { padding: 1.5rem 2rem; border-top: 1px solid var(--gray-100); }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .detail-item { font-size: .85rem; }
    .detail-item .label { color: var(--gray-400); font-size: .75rem; text-transform: uppercase; letter-spacing: .05em; margin-bottom: .2rem; }
    .detail-item .val { font-weight: 600; color: var(--soil); }
    /* Items list */
    .order-items-list { padding: 1rem 2rem; border-top: 1px solid var(--gray-100); }
    .order-item-row { display: flex; align-items: center; gap: 1rem; padding: .65rem 0; border-bottom: 1px solid var(--gray-100); }
    .order-item-row:last-child { border-bottom: none; }
    .item-img { width: 52px; height: 52px; border-radius: var(--radius-sm); object-fit: cover; background: var(--gray-100); flex-shrink: 0; display:flex;align-items:center;justify-content:center;font-size:1.5rem; }
    /* Cancelled banner */
    .cancelled-banner { background: rgba(192,57,43,.08); border-left: 4px solid var(--tomato); padding: 1rem 2rem; display: flex; align-items: center; gap: .75rem; }
    /* Orders List Page */
    .orders-list-wrap { max-width: 760px; margin: 0 auto; padding: 2rem 1rem; }
    .order-list-item {
      background: white;
      border-radius: var(--radius-lg);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--gray-100);
      cursor: pointer;
      transition: all var(--transition);
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
    }
    .order-list-item:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
    .order-list-status { display: flex; flex-direction: column; gap: .2rem; min-width: 120px; }
    @media (max-width: 600px) {
      .progress-steps::before { display: none; }
      .progress-fill { display: none; }
      .progress-steps { flex-direction: column; gap: 1rem; }
      .progress-step { flex-direction: row; align-items: center; gap: .75rem; }
      .step-label { text-align: left; max-width: none; font-size: .85rem; }
      .step-time { text-align: left; font-size: .75rem; }
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="container">
    <a href="../index.html" class="navbar-brand">🧺 LocalBasket</a>
    <ul class="navbar-nav">
      <li><a href="products.html">Shop</a></li>
      <li><a href="customer-dashboard.html">Dashboard</a></li>
      <li><a href="#" onclick="api.clearAuth();window.location='../index.html'">Logout</a></li>
    </ul>
    <a href="cart.html" class="navbar-cart">🛒 Cart</a>
  </div>
</nav>

<!-- Hero -->
<div class="track-hero">
  <div class="container">
    <h1>📦 Order Tracking</h1>
    <p>Real-time updates on your fresh produce delivery</p>
  </div>
</div>

<div id="app-root">
  <div class="container" style="text-align:center;padding:4rem">
    <div class="spinner" style="margin:auto"></div>
    <p class="text-muted mt-2">Loading your orders…</p>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
requireAuth('customer');

const urlParams = new URLSearchParams(window.location.search);
const directOrderId = urlParams.get('id');

const statusConfig = {
  placed:           { emoji: '🛒', label: 'Order Placed',        color: 'badge-blue',   step: 1 },
  confirmed:        { emoji: '✅', label: 'Confirmed',           color: 'badge-green',  step: 2 },
  preparing:        { emoji: '👨‍🌾', label: 'Preparing',         color: 'badge-orange', step: 3 },
  out_for_delivery: { emoji: '🚚', label: 'Out for Delivery',    color: 'badge-yellow', step: 4 },
  delivered:        { emoji: '🎉', label: 'Delivered',           color: 'badge-green',  step: 5 },
  cancelled:        { emoji: '❌', label: 'Cancelled',           color: 'badge-red',    step: 0 }
};

const progressSteps = [
  { key: 'placed',           emoji: '🛒', label: 'Placed' },
  { key: 'confirmed',        emoji: '✅', label: 'Confirmed' },
  { key: 'preparing',        emoji: '👨‍🌾', label: 'Preparing' },
  { key: 'out_for_delivery', emoji: '🚚', label: 'On the Way' },
  { key: 'delivered',        emoji: '🎉', label: 'Delivered' }
];

const catIcons = { vegetables:'🥦', fruits:'🍎', grains:'🌾', dairy:'🥛', eggs:'🥚', herbs:'🌿', spices:'🌶️', other:'🧺' };

document.addEventListener('DOMContentLoaded', async () => {
  if (directOrderId) {
    await renderOrderDetail(directOrderId);
  } else {
    await renderOrdersList();
  }
});

// ─── Orders List ─────────────────────────────────────────────────────────────
async function renderOrdersList() {
  const root = document.getElementById('app-root');
  try {
    const { orders } = await api.orders.getAll();

    if (!orders.length) {
      root.innerHTML = `
        <div class="orders-list-wrap">
          <div class="empty-state">
            <div class="empty-icon">📦</div>
            <h3>No orders yet</h3>
            <p>Your orders will appear here after you shop.</p>
            <a href="products.html" class="btn btn-primary mt-2">🛍️ Start Shopping</a>
          </div>
        </div>
      `;
      return;
    }

    root.innerHTML = `
      <div class="orders-list-wrap">
        <div class="flex items-center justify-between mb-3">
          <h2>All Orders <span style="font-size:1rem;color:var(--gray-400);font-weight:400">(${orders.length})</span></h2>
          <a href="products.html" class="btn btn-outline btn-sm">🛍️ Shop More</a>
        </div>
        ${orders.map(o => renderOrderListItem(o)).join('')}
      </div>
    `;
  } catch (err) {
    root.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Error loading orders</h3><p>${err.message}</p></div>`;
  }
}

function renderOrderListItem(o) {
  const sc = statusConfig[o.status] || statusConfig.placed;
  const isActive = !['delivered', 'cancelled'].includes(o.status);
  return `
    <div class="order-list-item" onclick="window.location.href='order-tracking.html?id=${o._id}'">
      <div style="font-size:2rem">${sc.emoji}</div>
      <div style="flex:1">
        <div class="flex items-center gap-1 mb-1" style="flex-wrap:wrap">
          <strong style="font-size:.95rem">Order #${o._id.slice(-8).toUpperCase()}</strong>
          <span class="badge ${sc.color}">${sc.label}</span>
          ${isActive ? '<span class="badge badge-blue" style="font-size:.65rem">LIVE</span>' : ''}
        </div>
        <div class="text-sm text-muted">${fmt.date(o.createdAt)} · ${o.items.length} item${o.items.length>1?'s':''}</div>
        <div class="text-sm" style="color:var(--bark);margin-top:.2rem">
          ${o.items.slice(0,2).map(i=>i.name).join(', ')}${o.items.length>2?` +${o.items.length-2} more`:''}
        </div>
      </div>
      <div class="order-list-status">
        <div style="font-weight:700;color:var(--leaf);font-size:1rem">₹${o.totalAmount}</div>
        <div class="text-sm text-muted">${o.paymentMethod}</div>
        <div class="text-sm" style="color:var(--leaf);margin-top:.2rem">Track →</div>
      </div>
    </div>
  `;
}

// ─── Order Detail with Progress ───────────────────────────────────────────────
async function renderOrderDetail(orderId) {
  const root = document.getElementById('app-root');
  try {
    const { order } = await api.orders.getById(orderId);
    const sc = statusConfig[order.status] || statusConfig.placed;
    const currentStep = sc.step;
    const isCancelled = order.status === 'cancelled';

    // Calculate progress bar width
    const progressPercent = isCancelled ? 0 : ((currentStep - 1) / (progressSteps.length - 1)) * 100;

    // Build progress steps HTML
    const stepsHTML = progressSteps.map((ps, i) => {
      const stepNum = i + 1;
      const done = !isCancelled && currentStep > stepNum;
      const active = !isCancelled && currentStep === stepNum;
      const cancelled = isCancelled;

      // Find matching history entry
      const histEntry = order.statusHistory?.find(h => h.status === ps.key);

      return `
        <div class="progress-step ${done?'done':''} ${active?'active':''} ${cancelled&&stepNum===1?'cancelled':''}">
          <div class="step-circle">${done ? '✓' : (active ? ps.emoji : ps.emoji)}</div>
          <div class="step-label">${ps.label}</div>
          ${histEntry ? `<div class="step-time">${fmt.date(histEntry.timestamp)}</div>` : '<div class="step-time"></div>'}
        </div>
      `;
    }).join('');

    // Build timeline HTML
    const timelineHTML = (order.statusHistory || []).slice().reverse().map((h, i) => {
      const sc2 = statusConfig[h.status];
      const isCurrent = i === 0;
      const isDone = i > 0;
      return `
        <div class="tl-item ${isCurrent?'current':''} ${isDone?'done':''}">
          <div class="tl-dot"></div>
          <div class="tl-content">
            <div class="tl-title">${sc2?.emoji || '📦'} ${sc2?.label || h.status}</div>
            <div class="tl-time">${fmt.date(h.timestamp)} at ${new Date(h.timestamp).toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'})}</div>
            ${h.note ? `<div class="tl-note">"${h.note}"</div>` : ''}
          </div>
        </div>
      `;
    }).join('');

    // Build items HTML
    const itemsHTML = order.items.map(item => `
      <div class="order-item-row">
        <div class="item-img">
          ${item.image ? `<img src="${item.image}" style="width:100%;height:100%;object-fit:cover;border-radius:var(--radius-sm)">` : (catIcons[item.category]||'🥬')}
        </div>
        <div style="flex:1">
          <div style="font-weight:600;font-size:.9rem">${item.name}</div>
          <div class="text-sm text-muted">by ${item.farmer?.farmName || item.farmer?.name || 'Farmer'}</div>
        </div>
        <div style="text-align:right">
          <div class="text-sm text-muted">${item.quantity} ${item.unit} × ₹${item.price}</div>
          <div style="font-weight:700;color:var(--leaf)">₹${(item.quantity * item.price).toFixed(2)}</div>
        </div>
      </div>
    `).join('');

    root.innerHTML = `
      <div class="container" style="padding-bottom:3rem">
        <!-- Back button -->
        <div style="padding:1rem 0">
          <a href="order-tracking.html" class="btn btn-ghost btn-sm">← All Orders</a>
        </div>

        <div class="order-track-card">
          <!-- Status header bar -->
          <div class="track-status-bar" style="${isCancelled?'background:linear-gradient(90deg,var(--tomato),#e74c3c)':''}">
            <div>
              <div class="status-label">Order #${order._id.slice(-8).toUpperCase()}</div>
              <div class="status-val">${sc.emoji} ${sc.label}</div>
            </div>
            <div style="text-align:right">
              <div class="status-label">Placed on</div>
              <div class="status-val" style="font-size:.9rem">${fmt.date(order.createdAt)}</div>
            </div>
          </div>

          ${isCancelled ? `
            <div class="cancelled-banner">
              <span style="font-size:1.5rem">❌</span>
              <div>
                <div style="font-weight:600;color:var(--tomato)">Order Cancelled</div>
                <div class="text-sm" style="color:var(--bark)">${order.cancellationReason || 'This order was cancelled.'}</div>
              </div>
            </div>
          ` : ''}

          <!-- Progress bar -->
          ${!isCancelled ? `
            <div class="progress-track">
              <h4 style="margin-bottom:1.25rem;font-family:var(--ff-display)">Delivery Progress</h4>
              <div class="progress-steps">
                <div class="progress-fill" style="width:${progressPercent}%"></div>
                ${stepsHTML}
              </div>
              ${order.status === 'out_for_delivery' ? `
                <div style="margin-top:1.5rem;background:rgba(45,106,45,.06);border-radius:var(--radius);padding:1rem;display:flex;align-items:center;gap:.75rem">
                  <span style="font-size:1.5rem;animation:pulse 1.5s infinite">🚚</span>
                  <div>
                    <div style="font-weight:600;font-size:.9rem">Your order is on the way!</div>
                    <div class="text-sm text-muted">Estimated delivery: Today${order.deliverySlot?' · '+order.deliverySlot:''}</div>
                  </div>
                </div>
              ` : ''}
              ${order.status === 'delivered' ? `
                <div style="margin-top:1.5rem;background:rgba(45,106,45,.08);border-radius:var(--radius);padding:1rem;display:flex;align-items:center;gap:.75rem">
                  <span style="font-size:1.5rem">🎉</span>
                  <div>
                    <div style="font-weight:600;font-size:.9rem;color:var(--leaf)">Delivered successfully!</div>
                    <div class="text-sm text-muted">Enjoy your fresh produce!</div>
                  </div>
                </div>
              ` : ''}
            </div>
          ` : ''}

          <!-- Timeline -->
          <div class="order-body">
            <h4 style="margin-bottom:1rem;font-family:var(--ff-display)">📋 Order Timeline</h4>
            <div class="timeline">${timelineHTML || '<p class="text-muted text-sm">No timeline entries.</p>'}</div>
          </div>

          <!-- Order Details -->
          <div class="order-body" style="border-top:1px solid var(--gray-100)">
            <h4 style="margin-bottom:1rem;font-family:var(--ff-display)">📦 Delivery Details</h4>
            <div class="detail-grid">
              <div class="detail-item">
                <div class="label">Deliver to</div>
                <div class="val">${order.deliveryAddress?.name || '-'}</div>
                <div class="text-sm text-muted">${order.deliveryAddress?.phone || ''}</div>
              </div>
              <div class="detail-item">
                <div class="label">Address</div>
                <div class="val">${order.deliveryAddress?.address || '-'}</div>
                <div class="text-sm text-muted">${order.deliveryAddress?.city}${order.deliveryAddress?.state?', '+order.deliveryAddress.state:''} – ${order.deliveryAddress?.pincode}</div>
              </div>
              <div class="detail-item">
                <div class="label">Payment</div>
                <div class="val">${order.paymentMethod}</div>
                <div class="text-sm text-muted">Status: ${order.paymentStatus}</div>
              </div>
              <div class="detail-item">
                <div class="label">Delivery Slot</div>
                <div class="val">${order.deliverySlot || 'Any time'}</div>
              </div>
            </div>
            ${order.notes ? `<div class="mt-2 p-2" style="background:var(--gray-50);border-radius:var(--radius-sm);font-size:.85rem;color:var(--bark)">📝 Note: ${order.notes}</div>` : ''}
          </div>

          <!-- Items -->
          <div class="order-items-list">
            <h4 style="margin-bottom:1rem;font-family:var(--ff-display)">🛒 Order Items</h4>
            ${itemsHTML}
            <div class="flex justify-between mt-2" style="padding-top:.75rem;border-top:2px solid var(--gray-100)">
              <span style="font-weight:600">Total Amount</span>
              <span style="font-size:1.2rem;font-weight:700;color:var(--leaf)">₹${order.totalAmount}</span>
            </div>
          </div>

          <!-- Actions -->
          <div style="padding:1.5rem 2rem;background:var(--gray-50);display:flex;gap:.75rem;flex-wrap:wrap">
            ${['placed','confirmed'].includes(order.status) ? `
              <button class="btn btn-danger btn-sm" onclick="cancelOrder('${order._id}')">❌ Cancel Order</button>
            ` : ''}
            ${order.status === 'delivered' ? `
              <a href="products.html" class="btn btn-primary btn-sm">🛍️ Order Again</a>
            ` : ''}
            <a href="customer-dashboard.html" class="btn btn-ghost btn-sm">← Dashboard</a>
          </div>
        </div>
      </div>
    `;

    // Auto-refresh for active orders
    if (!['delivered', 'cancelled'].includes(order.status)) {
      setTimeout(() => {
        console.log('🔄 Auto-refreshing order status…');
        renderOrderDetail(orderId);
      }, 30000); // refresh every 30s
    }

  } catch (err) {
    root.innerHTML = `
      <div class="orders-list-wrap">
        <div class="empty-state">
          <div class="empty-icon">⚠️</div>
          <h3>Order not found</h3>
          <p>${err.message}</p>
          <a href="order-tracking.html" class="btn btn-primary mt-2">← All Orders</a>
        </div>
      </div>
    `;
  }
}

async function cancelOrder(id) {
  const reason = prompt('Reason for cancellation (optional):') || 'Cancelled by customer';
  if (reason === null) return;
  try {
    await api.orders.cancel(id, reason);
    toast.success('Order cancelled.');
    setTimeout(() => renderOrderDetail(id), 1000);
  } catch (err) {
    toast.error(err.message);
  }
}
</script>
</body>
</html>
